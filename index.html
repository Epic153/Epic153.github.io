<!DOCTYPE html>
<html>
<head>
    <title>Currency Converter</title>
    <style>
        body {
            background-color: #2a2a2a;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ffc107;
            font-weight: bold;
        }

        label, select, input, button {
            margin: 5px;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #444;
            color: #fff;
        }

        select, input {
            min-width: 100px;
        }

        button {
            background-color: #ffc107;
            color: #2a2a2a;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #ffca28;
        }

        #converter {
            border: 2px solid #ffc107;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
            background-color: #2a2a2a;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        #result {
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="converter">
        <h1>Currency Converter</h1>
        <label for="amount">Amount:</label>
        <input type="number" id="amount" />
        <label for="from">From:</label>
        <select id="from">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="VND">VND</option> <!-- Added VND as an option -->
        </select>
        <label for="to">To:</label>
        <select id="to">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="VND">VND</option> <!-- Added VND as an option -->
        </select>
        <button onclick="convertCurrency()">Convert</button>
        <p id="result"></p>
    </div>

    <script>
        function convertCurrency() {
            const amount = parseFloat(document.getElementById('amount').value);
            const fromCurrency = document.getElementById('from').value;
            const toCurrency = document.getElementById('to').value;

            // Replace these rates with real exchange rates to get accurate results
            const exchangeRates = {
                USD: {
                    EUR: 0.85,
                    GBP: 0.73,
                    VND: 22745.35, // Added VND exchange rate (1 USD = 22,745.35 VND)
                },
                EUR: {
                    USD: 1.18,
                    GBP: 0.86,
                    VND: 26767.53, // Added VND exchange rate (1 EUR = 26,767.53 VND)
                },
                GBP: {
                    USD: 1.37,
                    EUR: 1.16,
                    VND: 31236.22, // Added VND exchange rate (1 GBP = 31,236.22 VND)
                },
                VND: {
                    USD: 0.000044,
                    EUR: 0.000037,
                    GBP: 0.000032,
                },
            };

            if (isNaN(amount)) {
                alert('Please enter a valid amount.');
                return;
            }

            if (fromCurrency === toCurrency) {
                alert('Please select different currencies.');
                return;
            }

            if (!exchangeRates[fromCurrency] || !exchangeRates[fromCurrency][toCurrency]) {
                alert('Currency not supported.');
                return;
            }

            const convertedAmount = amount * exchangeRates[fromCurrency][toCurrency];
            document.getElementById('result').innerText = `${amount} ${fromCurrency} = ${convertedAmount.toFixed(2)} ${toCurrency}`;
        }
    </script>
</body>
</html>
