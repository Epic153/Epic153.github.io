<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 - Page Not Found</title>
    <link rel="stylesheet" href="error.css">
</head>
<body>
    <div class="error-container">
        <h1>Oops! Page Not Found</h1>
        <h2>We couldn't find the page you're looking for.</h2>
        <p>Don't worry, you can explore these options:</p>
        <ul class="navigation">
            <li><a href="index.html">Home</a></li>
            <li><a href="/blog">Blog</a></li>
            <li><a href="/contact">Contact Us</a></li>
        </ul>
        <div class="search-bar">
            <input type="text" placeholder="Search">
            <button type="submit">Search</button>
        </div>
        <div class="social-media">
            <a href="https://www.facebook.com/profile.php?id=100074210896806">Facebook</a>
            <a href="https://twitter.com/yourpage">Twitter</a>
            <a href="https://instagram.com/yourpage">Instagram</a>
        </div>
        <div class="newsletter">
            <p>Subscribe to our newsletter for updates:</p>
            <input type="email" placeholder="Your Email">
            <button type="submit">Subscribe</button>
        </div>
        <p class="contact-info">Need assistance? <a href="/contact">Contact us</a>.</p>
    </div>
</body>
</html>
